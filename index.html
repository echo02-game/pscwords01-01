<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普通話水平測試 - 難點字詞練習詞卡</title>
    <style>
        /* CSS 變量與全局設定 */
        :root {
            --color-light: #91C6BC;
            --color-main: #4B9DA9;
            --color-bg: #FFFFFF;
            --color-accent: #E37434;
            --font-yuanti: "Yuanti SC", "YouYuan", "STYuanti", "Microsoft YaHei", sans-serif;
            --font-pinyin: "Calibri", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-yuanti);
            background-color: var(--color-bg);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 防止整個頁面滾動 */
            
            /* 在 body 設置防選取，避免影響到 input */
            -webkit-user-select: none;
            user-select: none; 
        }

        /* 確保輸入框可以正常點擊和輸入文字 (修復無法登入的 Bug) */
        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }

        /* 頂部標題與計數器 */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 10;
        }

        .title-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .title-line1 {
            color: #666666;
            font-size: 1rem;
            font-weight: normal;
        }

        .title-line2 {
            color: #000000;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .counter {
            color: var(--color-main);
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 視圖切換管理 */
        .view {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .view.active {
            display: flex;
        }

        /* 登入視圖 */
        #login-view {
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        #login-view h2 {
            color: #000000;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid var(--color-light);
            border-radius: 10px;
            font-family: var(--font-yuanti);
            outline: none;
        }

        input:focus {
            border-color: var(--color-main);
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: var(--font-yuanti);
            background-color: var(--color-main);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--color-light);
        }

        .error-msg {
            color: var(--color-accent);
            font-size: 1rem;
            min-height: 1.5em;
        }

        /* 詞卡視圖 */
        #card-view {
            position: relative;
        }

        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 4/3;
            margin: 20px auto;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 90%;
            height: 90%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: white;
            border-radius: 20px;
            border: 4px solid var(--color-light);
            padding: 20px;
        }

        .card-back {
            transform: rotateY(180deg);
            border-color: var(--color-main);
        }

        .hanzi {
            font-size: clamp(3rem, 10vw, 6rem);
            color: #333;
            font-weight: bold;
        }

        .pinyin {
            font-family: var(--font-pinyin);
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: var(--color-accent);
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .controls button {
            flex: 1;
            max-width: 150px;
        }

        /* 開發者模式 */
        #dev-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            opacity: 0.3;
            cursor: pointer;
            display: none;
            z-index: 100;
        }

        #dev-panel {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            z-index: 99;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #dev-panel textarea {
            width: 300px;
            height: 200px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        /* 結算視圖 */
        #finish-view {
            overflow-y: auto;
            justify-content: flex-start;
            padding-bottom: 60px;
        }

        #finish-view h2 {
            color: #4B9DA9;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-width: 800px;
            margin-bottom: 40px;
        }

        .word-item {
            background-color: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid var(--color-light);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
        }

        .word-item:hover {
            border-color: var(--color-main);
            transform: translateY(-2px);
        }

        .word-item .pinyin {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .word-item .hanzi {
            font-size: 1.5rem;
        }

        #restart-btn {
            background-color: #91C6BC;
            margin-bottom: 30px;
        }

        #restart-btn:hover {
            background-color: var(--color-main);
        }

        /* 底部版權宣告 */
        footer {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 0.7rem;
            color: #999;
            text-align: right;
            max-width: 80%;
            z-index: 5;
            pointer-events: none;
        }

        /* 響應式微調 */
        @media (max-width: 600px) {
            .title-line1 { font-size: 0.8rem; }
            .title-line2 { font-size: 1.2rem; }
            header { padding: 10px; }
            .controls button { padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- 頂部標題與計數器 -->
    <header id="main-header" style="display: none;">
        <div class="title-container">
            <h2 class="title-line1">普通話水平測試</h2>
            <h1 class="title-line2">【作品1號】難點字詞練習詞卡</h1>
        </div>
        <div class="counter" id="counter">1/23</div>
    </header>

    <!-- 登入視圖 -->
    <div id="login-view" class="view active">
        <h2>開始練習</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="請輸入姓名">
            <input type="password" id="password" placeholder="請輸入密碼">
        </div>
        <div class="error-msg" id="login-error"></div>
        <button id="login-btn">進入</button>
    </div>

    <!-- 詞卡視圖 -->
    <div id="card-view" class="view">
        <div id="dev-toggle">🛠️</div>
        
        <div id="dev-panel">
            <p><strong>時間軸標記工具</strong></p>
            <button id="dev-start-btn" style="padding: 5px 10px; font-size: 0.9rem; margin: 10px 0;">開始錄製模式</button>
            <button id="dev-mark-btn" style="padding: 5px 10px; font-size: 0.9rem; background: var(--color-accent); margin: 10px 0;" disabled>標記下一句 (或按空白鍵)</button>
            <p id="dev-status">等待開始...</p>
            <textarea id="dev-output" readonly></textarea>
        </div>

        <div class="card-container">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <div class="hanzi" id="front-hanzi"></div>
                </div>
                <div class="card-face card-back">
                    <div class="pinyin" id="back-pinyin"></div>
                    <div class="hanzi" id="back-hanzi"></div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="prev-btn">上一個</button>
            <button id="next-btn">下一個</button>
        </div>
    </div>

    <!-- 結算視圖 -->
    <div id="finish-view" class="view">
        <h2>恭喜完成練習，讀得真不錯！</h2>
        <button id="restart-btn">再來一遍</button>
        <div class="word-list" id="word-list"></div>
    </div>

    <!-- 底部版權 -->
    <footer>
        本網頁拼音均由AI生成，標準注音請參考《普通話水平測試實施綱要（2021年版）》。<br>
        錄音僅供參考。網頁僅供VTC内部使用。職業訓練局普通話培訓測試中心版權所有。
    </footer>

    <!-- 音頻對象 -->
    <audio id="audio-player" src="word01.mp3" preload="auto"></audio>

    <script>
        // === 數據定義 ===
        let sentenceData = [ 
            { "word": "規矩", "pinyin": "guī ju", "start": 0, "end": 1.921517 }, 
            { "word": "臘月", "pinyin": "là yuè", "start": 1.921517, "end": 3.81552 }, 
            { "word": "初旬", "pinyin": "chū xún", "start": 3.81552, "end": 6.303705 }, 
            { "word": "開始", "pinyin": "kāi shǐ", "start": 6.303705, "end": 9.073361 }, 
            { "word": "時候", "pinyin": "shí hou", "start": 9.073361, "end": 11.220169 }, 
            { "word": "展覽會", "pinyin": "zhǎn lǎn huì", "start": 11.220169, "end": 14.644569 }, 
            { "word": "蒜瓣", "pinyin": "suàn bànr", "start": 14.644569, "end": 16.778755 }, 
            { "word": "餃子", "pinyin": "jiǎo zi", "start": 16.778755, "end": 18.922742 }, 
            { "word": "辣味", "pinyin": "là wèir", "start": 18.922742, "end": 21.304012 }, 
            { "word": "忍不住", "pinyin": "rěn bu zhù", "start": 21.304012, "end": 23.569868 }, 
            { "word": "雜拌兒", "pinyin": "zá bànr", "start": 23.569868, "end": 25.802998 }, 
            { "word": "榛子", "pinyin": "zhēn zi", "start": 25.802998, "end": 27.834306 }, 
            { "word": "蜜餞", "pinyin": "mì jiàn", "start": 27.834306, "end": 30.254372 }, 
            { "word": "摻和", "pinyin": "chān huo", "start": 30.254372, "end": 32.719995 }, 
            { "word": "零七八碎兒", "pinyin": "líng qī bā suìr", "start": 32.719995, "end": 35.919265 }, 
            { "word": "玩意兒", "pinyin": "wán yìr", "start": 35.919265, "end": 38.086688 }, 
            { "word": "風箏", "pinyin": "fēng zheng", "start": 38.086688, "end": 40.399383 }, 
            { "word": "氣象", "pinyin": "qì xiàng", "start": 40.399383, "end": 43.152664 }, 
            { "word": "擦黑兒", "pinyin": "cā hēir", "start": 43.152664, "end": 45.786153 }, 
            { "word": "長方塊", "pinyin": "cháng fāng kuàir", "start": 45.786153, "end": 49.386609 }, 
            { "word": "黏", "pinyin": "nián", "start": 49.386609, "end": 51.02292 }, 
            { "word": "掃除", "pinyin": "sǎo chú", "start": 51.02292, "end": 53.88613 }, 
            { "word": "充足", "pinyin": "chōng zú", "start": 53.88613, "end": 56.55776 } 
        ];

        // === 狀態變量 ===
        let currentIndex = 0;
        let isFlipped = false;
        let audioPlayer = document.getElementById('audio-player');
        let playTimeout;

        // === DOM 元素 ===
        const loginView = document.getElementById('login-view');
        const cardView = document.getElementById('card-view');
        const finishView = document.getElementById('finish-view');
        const mainHeader = document.getElementById('main-header');
        
        const loginBtn = document.getElementById('login-btn');
        const passwordInput = document.getElementById('password');
        const usernameInput = document.getElementById('username');
        const loginError = document.getElementById('login-error');
        
        const flashcard = document.getElementById('flashcard');
        const frontHanzi = document.getElementById('front-hanzi');
        const backHanzi = document.getElementById('back-hanzi');
        const backPinyin = document.getElementById('back-pinyin');
        const counter = document.getElementById('counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const wordList = document.getElementById('word-list');

        // === 登入邏輯 ===
        function attemptLogin() {
            // 加入 trim() 避免誤按空格，加入 toLowerCase() 避免大寫鎖定，增加容錯率
            const inputVal = passwordInput.value.trim().toLowerCase();
            if (inputVal === 'vtcpsc') {
                if (usernameInput.value.trim() === '') {
                    loginError.textContent = '請輸入姓名';
                    return;
                }
                loginError.textContent = '';
                loginView.classList.remove('active');
                cardView.classList.add('active');
                mainHeader.style.display = 'flex';
                updateCard();
            } else {
                loginError.textContent = '請輸入正確密碼';
            }
        }

        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });

        // === 詞卡邏輯 ===
        function updateCard() {
            const data = sentenceData[currentIndex];
            frontHanzi.textContent = data.word;
            backHanzi.textContent = data.word;
            backPinyin.textContent = data.pinyin;
            counter.textContent = `${currentIndex + 1}/${sentenceData.length}`;
            
            isFlipped = false;
            flashcard.classList.remove('is-flipped');
            
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? '0.5' : '1';
        }

        function playAudioSnippet(start, end) {
            clearTimeout(playTimeout);
            audioPlayer.currentTime = start;
            audioPlayer.play();
            
            const duration = (end - start) * 1000;
            playTimeout = setTimeout(() => {
                audioPlayer.pause();
            }, duration);
        }

        flashcard.addEventListener('click', () => {
            isFlipped = true;
            flashcard.classList.add('is-flipped');
            const data = sentenceData[currentIndex];
            playAudioSnippet(data.start, data.end);
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < sentenceData.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                showFinishView();
            }
        });

        // === 結算視圖邏輯 ===
        function showFinishView() {
            cardView.classList.remove('active');
            finishView.classList.add('active');
            mainHeader.style.display = 'none';
            
            wordList.innerHTML = '';
            sentenceData.forEach((item) => {
                const el = document.createElement('div');
                el.className = 'word-item';
                el.innerHTML = `<div class="pinyin">${item.pinyin}</div><div class="hanzi">${item.word}</div>`;
                el.addEventListener('click', () => playAudioSnippet(item.start, item.end));
                wordList.appendChild(el);
            });
        }

        restartBtn.addEventListener('click', () => {
            currentIndex = 0;
            finishView.classList.remove('active');
            cardView.classList.add('active');
            mainHeader.style.display = 'flex';
            updateCard();
        });

        // === 開發者模式邏輯 ===
        const devToggle = document.getElementById('dev-toggle');
        const devPanel = document.getElementById('dev-panel');
        const devStartBtn = document.getElementById('dev-start-btn');
        const devMarkBtn = document.getElementById('dev-mark-btn');
        const devStatus = document.getElementById('dev-status');
        const devOutput = document.getElementById('dev-output');
        
        let isDevMode = false;
        let isRecording = false;
        let devData = [];
        let currentRecordIndex = 0;
        let lastMarkTime = 0;

        if (navigator.userAgent.indexOf("Win") !== -1) {
            devToggle.style.display = 'block';
        }

        devToggle.addEventListener('click', () => {
            isDevMode = !isDevMode;
            devPanel.style.display = isDevMode ? 'block' : 'none';
        });

        devStartBtn.addEventListener('click', () => {
            isRecording = true;
            devData = JSON.parse(JSON.stringify(sentenceData));
            currentRecordIndex = 0;
            lastMarkTime = 0;
            devOutput.value = '';
            devMarkBtn.disabled = false;
            
            currentIndex = 0;
            updateCard();
            
            devStatus.textContent = `錄製中: 第 ${currentRecordIndex + 1} 個詞 (${devData[currentRecordIndex].word})`;
            
            clearTimeout(playTimeout);
            audioPlayer.currentTime = 0;
            audioPlayer.play();
        });

        function markTime() {
            if (!isRecording) return;
            
            const currentTime = audioPlayer.currentTime;
            devData[currentRecordIndex].start = lastMarkTime;
            devData[currentRecordIndex].end = currentTime;
            lastMarkTime = currentTime;
            
            currentRecordIndex++;
            
            if (currentRecordIndex < devData.length) {
                devStatus.textContent = `錄製中: 第 ${currentRecordIndex + 1} 個詞 (${devData[currentRecordIndex].word})`;
                currentIndex = currentRecordIndex;
                updateCard();
            } else {
                audioPlayer.pause();
                isRecording = false;
                devMarkBtn.disabled = true;
                devStatus.textContent = "錄製完成！";
                devOutput.value = "let sentenceData = " + JSON.stringify(devData, null, 4) + ";";
            }
        }

        devMarkBtn.addEventListener('click', markTime);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isRecording) {
                e.preventDefault();
                markTime();
            }
        });

    </script>
</body>
</html>
